# Cleanvey rule configuration.
# Everything here is optional — Cleanvey ships sensible defaults. Copy this file,
# edit it, and pass it with `--config your_rules.yaml` to override.
#
# For each rule you can set:
#   enabled : true/false   turn the rule on or off
#   weight  : number       how much it contributes to the risk score
#   params  : {...}        rule-specific thresholds (see comments)

rules:
  speeding:
    enabled: true
    weight: 1.0
    params:
      relative_ratio: 0.34   # flag if duration < 34% of the median duration
      min_seconds: 0         # absolute floor in seconds (0 = ignore)

  straightlining:
    enabled: true
    weight: 1.0
    params:
      min_items: 3           # need at least this many scale answers
      std_threshold: 0.0     # 0 = all identical; raise to allow tiny variation

  pattern:
    enabled: true
    weight: 0.8

  contradiction:
    enabled: true
    weight: 0.7
    params:
      gap_threshold: 0.8     # 0..1 normalised gap between NPS and satisfaction

  gibberish:
    enabled: true
    weight: 0.9

  duplicate_text:
    enabled: true
    weight: 0.7
    params:
      min_len: 8             # ignore short generic answers when matching

  offtopic:                  # LLM rule — runs only when an API key is set
    enabled: true
    weight: 0.8
    params:
      max_rows: 300

  duplicate_respondent:
    enabled: true
    weight: 0.9
    params:
      min_answered: 5        # need this many answered objective questions

  missing:
    enabled: true
    weight: 0.6
    params:
      max_missing_ratio: 0.5 # flag if more than 50% of key questions are blank

  out_of_range:
    enabled: true
    weight: 0.7
    params:
      nps_min: 0
      nps_max: 10

  low_effort:                  # "don't know / none / whatever" open-ends
    enabled: true
    weight: 0.5
    params:
      negative_polarity_cols: []   # columns where "none" is a valid answer

  too_short:                   # open-ends with too few effective characters
    enabled: true
    weight: 0.3
    params:
      min_chars: 4             # conservative; raise per project

  near_duplicate:              # fuzzy near-duplicate -> review only, not drop
    enabled: true
    weight: 0.4
    params:
      similarity: 0.9          # 0..1 RapidFuzz ratio
      min_len: 10
      max_rows: 2000

  logic_check:                 # configurable common-sense consistency checks
    enabled: true
    weight: 0.8
    # Constraints only fire if their columns exist, so this is safe across
    # datasets. Types:
    #   gte_diff (a-b>=min) | le_cols (a<=b) | not_both (mutually exclusive)
    #   forbidden_combo (a in a_in AND b in b_in)  -- "dead" contradictions
    #   requires_answered / requires_blank          -- skip-logic
    # The ones below are illustrative — declare your own.
    params:
      constraints:
        - {type: gte_diff, a: age, b: child_age, min: 16, label: "受访者与子女年龄差不合常理"}
        - {type: le_cols, a: personal_income, b: household_income, label: "个人收入高于家庭总收入"}
        # - {type: forbidden_combo, a: nps, a_in: [0], b: intent, b_in: ["一定会推荐"], label: "推荐分与意愿死亡矛盾"}
        # - {type: requires_answered, if_col: used_before, if_in: ["是"], then_col: satisfaction, label: "用过却未评分"}

# Risk bucketing: respondents with weighted risk >= high -> 高 (drop),
# >= medium -> 中 (review), otherwise 低 (keep).
scoring:
  high: 0.9
  medium: 0.4
